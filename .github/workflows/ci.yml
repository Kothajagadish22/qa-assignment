name: QA Automation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: pytest (UI + API)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      USE_API_MOCKS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run API tests
        run: python -m pytest assignment2-api -c pytest-ci.ini --junitxml=api-results.xml
        env:
          PYTHONPATH: assignment2-api

      - name: Run UI tests
        run: python -m pytest assignment1-ui -c pytest-ci.ini --junitxml=ui-results.xml
        env:
          PYTHONPATH: assignment1-ui

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            api-results.xml
            ui-results.xml
          retention-days: 14
