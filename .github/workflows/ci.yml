name: QA Automation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: pytest (UI + API)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run API tests
        run: pytest assignment2-api -v --tb=short -o addopts=

      - name: Run UI tests
        run: pytest assignment1-ui -v --tb=short -o addopts=

      - name: Upload HTML report
        if: always()
        run: pytest --html=report.html --self-contained-html -q -o addopts=
        continue-on-error: true

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: report.html
          retention-days: 14
