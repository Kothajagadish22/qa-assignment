[pytest]
testpaths =
    assignment1-ui/tests
    assignment2-api/tests
addopts = -v --tb=short --strict-markers
markers =
    positive: positive / happy-path scenarios
    negative: negative / error scenarios
    e2e: end-to-end user journeys
    auth: authentication scenarios
    schema: response schema validation
    datadriven: data-driven (parametrised) scenarios
    contract: contract / snapshot scenarios
    ui: SauceDemo UI tests (Assignment 1)
    api: FakeStoreAPI tests (Assignment 2)
